name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag (e.g. v1.0.0)"
        required: true
        default: v1.0.0
      android_only:
        description: "Upload Android APK only (add to an existing release)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  macos-app:
    name: macOS app zip
    if: github.event_name == 'push' || inputs.android_only == false
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build unsigned app for Apple Silicon Mac
        run: |
          xcodebuild \
            -project IOS/BmuAttendance.xcodeproj \
            -scheme BmuAttendance \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build
          ditto -c -k --sequesterRsrc --keepParent \
            build/DerivedData/Build/Products/Release-iphoneos/BmuAttendance.app \
            build/BmuAttendance-macOS-apple-silicon.zip

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: build/BmuAttendance-macOS-apple-silicon.zip

  android-apk:
    name: Android release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android/app
    steps:
      - uses: actions/checkout@v4
        with:
          # v1.0.0 predates Android in the repo; backfill builds from main.
          ref: ${{ github.event_name == 'push' && github.ref || (inputs.android_only && 'main' || inputs.tag) }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Build unsigned release APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon

      - name: Stage APK for release
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          test -n "$APK"
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          cp "$APK" "../../build/BmuAttendance-android-${VERSION}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/BmuAttendance-android-*.apk

  publish:
    name: Publish full release
    if: github.event_name == 'push' || inputs.android_only == false
    runs-on: ubuntu-latest
    needs: [macos-app, android-apk]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/macos-app/BmuAttendance-macOS-apple-silicon.zip
            dist/android-apk/*
          generate_release_notes: true

  publish-android-addon:
    name: Attach APK to existing release
    if: github.event_name == 'workflow_dispatch' && inputs.android_only == true
    runs-on: ubuntu-latest
    needs: [android-apk]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist

      - name: Upload APK to ${{ inputs.tag }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: dist/*
          generate_release_notes: false
