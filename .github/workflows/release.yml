name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-app:
    name: macOS app zip
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build unsigned app for Apple Silicon Mac
        run: |
          xcodebuild \
            -project IOS/BmuAttendance.xcodeproj \
            -scheme BmuAttendance \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build
          ditto -c -k --sequesterRsrc --keepParent \
            build/DerivedData/Build/Products/Release-iphoneos/BmuAttendance.app \
            build/BmuAttendance-macOS-apple-silicon.zip

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: build/BmuAttendance-macOS-apple-silicon.zip

  android-apk:
    name: Android release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android/app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Build unsigned release APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon

      - name: Stage APK for release
        run: |
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          test -n "$APK"
          cp "$APK" ../../build/BmuAttendance-android-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/BmuAttendance-android-release.apk

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [macos-app, android-apk]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/macos-app/BmuAttendance-macOS-apple-silicon.zip
            dist/android-apk/BmuAttendance-android-release.apk
          generate_release_notes: true
